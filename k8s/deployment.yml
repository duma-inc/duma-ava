apiVersion: apps/v1
kind: Deployment
metadata:
  name: duma-ava
  namespace: duma
  labels:
    app: duma-ava
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: duma-ava
  template:
    metadata:
      labels:
        app: duma-ava
    spec:
      nodeSelector:
        kubernetes.io/hostname: srv1158721
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: duma-ava
          image: ghcr.io/matheusffalbuquerque/duma-ava:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: duma-ava-config
            - secretRef:
                name: duma-ava-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
