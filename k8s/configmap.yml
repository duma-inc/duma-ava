apiVersion: v1
kind: ConfigMap
metadata:
  name: duma-ava-config
  namespace: duma
  labels:
    app: duma-ava
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXTAUTH_URL: "https://ava.dumaway.com"
  AUTH_URL: "https://ava.dumaway.com"
  KEYCLOAK_CLIENT_ID: "duma-web"
  KEYCLOAK_ISSUER: "https://auth.dumaway.com/realms/duma-realm"
  NEXT_PUBLIC_API_URL: "https://ava.dumaway.com/api"
  NEXT_PUBLIC_KEYCLOAK_ISSUER: "https://auth.dumaway.com/realms/duma-realm"
  NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: "duma-web"
